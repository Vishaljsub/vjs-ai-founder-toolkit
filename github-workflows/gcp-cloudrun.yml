name: Deploy to GCP

# Push-to-deploy for GCP Cloud Run. Auth uses Workload Identity Federation — no
# downloaded service-account keys. The WIF provider + deployer SA identifiers below
# are NOT secrets; access is gated entirely by the WIF trust condition
# (assertion.repository == '<OWNER>/<REPO>'), which you set when you create the
# WIF pool/provider (see the toolkit's SETUP.md). Fill in every <PLACEHOLDER>
# before using this file, then save it as .github/workflows/gcp-deploy.yml.

on:
  push:
    branches: [main]              # <-- your main branch, e.g. main / master
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/gcp-deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write                 # required for keyless WIF auth

env:
  PROJECT: <GCP_PROJECT_ID>
  REGION: <GCP_REGION>                                    # e.g. us-central1
  AR: <GCP_REGION>-docker.pkg.dev/<GCP_PROJECT_ID>/<ARTIFACT_REPO>
  WIF_PROVIDER: projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/<POOL_ID>/providers/<PROVIDER_ID>
  DEPLOY_SA: <DEPLOYER_SA_NAME>@<GCP_PROJECT_ID>.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build backend image
        run: |
          gcloud builds submit backend --project "$PROJECT" --quiet \
            --tag "$AR/backend:$GITHUB_SHA"

      - name: Build frontend image
        run: |
          BURL=$(gcloud run services describe <APP_NAME>-backend --project "$PROJECT" --region "$REGION" --format='value(status.url)')
          gcloud builds submit frontend --project "$PROJECT" --quiet \
            --tag "$AR/frontend:$GITHUB_SHA" \
            --substitutions=_API_URL="$BURL"

      - name: Deploy backend
        run: |
          gcloud run services update <APP_NAME>-backend \
            --project "$PROJECT" --region "$REGION" \
            --image "$AR/backend:$GITHUB_SHA"

      - name: Deploy frontend
        run: |
          gcloud run services update <APP_NAME>-frontend \
            --project "$PROJECT" --region "$REGION" \
            --image "$AR/frontend:$GITHUB_SHA"

      - name: Smoke test
        run: |
          B=$(gcloud run services describe <APP_NAME>-backend --project "$PROJECT" --region "$REGION" --format='value(status.url)')
          curl -sf "$B/health" || (echo "backend health check failed" && exit 1)
